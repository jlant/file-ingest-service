<svg xmlns="http://www.w3.org/2000/svg" width="680" height="340" viewBox="0 0 680 340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img">
  <title>File ingest service boundary architecture</title>
  <desc>The service and ingest logic depend on two protocols, FileSource and FileRouter, obtained through factory methods. Real implementations use the local filesystem; fakes are used in tests.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="230" y="30" width="220" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="340" y="54" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">service + ingest</text>
  <text x="340" y="72" text-anchor="middle" font-size="12" fill="#534AB7">orchestrates one pass</text>

  <line x1="300" y1="86" x2="205" y2="124" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="86" x2="475" y2="124" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="340" y="114" text-anchor="middle" font-size="12" fill="#5F5E5A">factory methods return these</text>

  <rect x="70" y="126" width="240" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="190" y="150" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">FileSource protocol</text>
  <text x="190" y="168" text-anchor="middle" font-size="12" fill="#185FA5">list_pending</text>

  <rect x="370" y="126" width="240" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="490" y="150" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">FileRouter protocol</text>
  <text x="490" y="168" text-anchor="middle" font-size="12" fill="#185FA5">route_processed, route_error</text>

  <line x1="150" y1="182" x2="132" y2="220" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="230" y1="182" x2="248" y2="220" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="182" x2="432" y2="220" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="182" x2="548" y2="220" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="222" width="140" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="130" y="243" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">LocalFileSource</text>
  <text x="130" y="261" text-anchor="middle" font-size="12" fill="#0F6E56">inbox directory</text>

  <rect x="212" y="222" width="126" height="50" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="275" y="243" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">FakeFileSource</text>
  <text x="275" y="261" text-anchor="middle" font-size="12" fill="#5F5E5A">tests</text>

  <rect x="366" y="222" width="140" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="436" y="243" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">LocalFileRouter</text>
  <text x="436" y="261" text-anchor="middle" font-size="12" fill="#0F6E56">processed / error</text>

  <rect x="518" y="222" width="126" height="50" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="581" y="243" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">FakeFileRouter</text>
  <text x="581" y="261" text-anchor="middle" font-size="12" fill="#5F5E5A">tests</text>

  <text x="340" y="300" text-anchor="middle" font-size="12" fill="#5F5E5A">the ingest logic never touches the filesystem directly, so tests run with fakes and no mocking</text>
</svg>
