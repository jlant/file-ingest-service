<svg xmlns="http://www.w3.org/2000/svg" width="680" height="300" viewBox="0 0 680 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img">
  <title>File ingest service runtime flow</title>
  <desc>Each run lists pending files in the inbox, then for each file validates and processes it, routing it to the processed directory on success or quarantining it in the error directory on failure.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="30" y="34" width="150" height="54" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="105" y="57" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">one run</text>
  <text x="105" y="75" text-anchor="middle" font-size="12" fill="#5F5E5A">single pass, then exit</text>
  <line x1="180" y1="61" x2="228" y2="61" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="230" y="34" width="170" height="54" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="315" y="57" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">list pending</text>
  <text x="315" y="75" text-anchor="middle" font-size="12" fill="#185FA5">inbox, filtered by suffix</text>

  <text x="340" y="114" text-anchor="middle" font-size="12" fill="#5F5E5A">then, per file:</text>

  <rect x="120" y="132" width="180" height="54" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="210" y="155" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">validate + process</text>
  <text x="210" y="173" text-anchor="middle" font-size="12" fill="#534AB7">exists? big enough?</text>

  <line x1="300" y1="148" x2="386" y2="128" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="349" y="128" text-anchor="middle" font-size="11" fill="#3B6D11">ok</text>
  <line x1="300" y1="172" x2="386" y2="212" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="345" y="205" text-anchor="middle" font-size="11" fill="#854F0B">fails</text>

  <rect x="388" y="94" width="180" height="54" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <text x="478" y="117" text-anchor="middle" font-size="14" font-weight="500" fill="#27500A">route to processed</text>
  <text x="478" y="135" text-anchor="middle" font-size="12" fill="#3B6D11">moved out of inbox</text>

  <rect x="388" y="196" width="180" height="54" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="478" y="219" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">route to error</text>
  <text x="478" y="237" text-anchor="middle" font-size="12" fill="#854F0B">quarantined, not retried</text>

  <text x="340" y="284" text-anchor="middle" font-size="12" fill="#5F5E5A">every file leaves the inbox exactly once, so a bad file is set aside rather than retried forever</text>
</svg>
